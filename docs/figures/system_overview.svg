<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Reasoning Process Evaluation Framework for Large Language Models</title>
  <desc id="desc">A left-to-right academic system overview diagram showing input reasoning tasks, reasoning generation strategies, graph-based process evaluation for depth breadth and consistency, and structured output metrics.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .module { fill: #f8fafc; stroke: #d6dee8; stroke-width: 1.5; filter: url(#softShadow); }
      .module-core { fill: #fff7ed; stroke: #f97316; stroke-width: 2.3; filter: url(#softShadow); }
      .header { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1; }
      .header-core { fill: #ffedd5; stroke: #fdba74; stroke-width: 1; }
      .card { fill: #ffffff; stroke: #d6dee8; stroke-width: 1.2; }
      .card-blue { fill: #f0f7ff; stroke: #93c5fd; stroke-width: 1.2; }
      .card-orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.2; }
      .chip { fill: #eef2ff; stroke: #bfdbfe; stroke-width: 1; }
      .chip-orange { fill: #ffedd5; stroke: #fdba74; stroke-width: 1; }
      .node { fill: #ffffff; stroke: #2563eb; stroke-width: 2; }
      .node-gray { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.8; }
      .node-orange { fill: #fff7ed; stroke: #f97316; stroke-width: 2.2; }
      .edge { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrowBlue); }
      .edge-gray { stroke: #6b7280; stroke-width: 1.8; fill: none; marker-end: url(#arrowGray); }
      .edge-dashed { stroke: #9ca3af; stroke-width: 1.7; stroke-dasharray: 5 5; fill: none; marker-end: url(#arrowGray); }
      .edge-broken { stroke: #f97316; stroke-width: 2.2; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrowBlue); }
      .arrow-main { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #4b5563; }
      .htext { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #1f2937; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 600; fill: #374151; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #4b5563; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 9.5px; fill: #6b7280; }
      .mono { font-family: "Cascadia Mono", Consolas, "Courier New", monospace; font-size: 10.5px; fill: #374151; }
      .score { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; fill: #1f2937; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <text class="title" x="800" y="42" text-anchor="middle">Reasoning Process Evaluation Framework for LLMs</text>
  <text class="subtitle" x="800" y="68" text-anchor="middle">structured task JSON → multi-path reasoning → graph-based process assessment → structured scores</text>

  <!-- Main module containers -->
  <rect class="module" x="40" y="95" width="320" height="735" rx="22"/>
  <rect class="module" x="400" y="95" width="320" height="735" rx="22"/>
  <rect class="module-core" x="760" y="95" width="510" height="735" rx="22"/>
  <rect class="module" x="1320" y="95" width="240" height="735" rx="22"/>

  <!-- Inter-module arrows -->
  <path class="arrow-main" d="M 365 462 L 392 462"/>
  <path class="arrow-main" d="M 725 462 L 752 462"/>
  <path class="arrow-main" d="M 1276 462 L 1312 462"/>

  <!-- Module 1: Input Layer -->
  <rect class="header" x="62" y="118" width="276" height="42" rx="13"/>
  <text class="htext" x="200" y="145" text-anchor="middle">1. Input Layer</text>

  <rect class="card-blue" x="70" y="178" width="260" height="166" rx="14"/>
  <text class="label" x="88" y="204">Structured reasoning-task JSON</text>
  <text class="mono" x="88" y="229">{</text>
  <text class="mono" x="102" y="246">"question": "...",</text>
  <text class="mono" x="102" y="263">"gold_answer": "...",</text>
  <text class="mono" x="102" y="280">"gold_reasoning_graph": tree/DAG,</text>
  <text class="mono" x="102" y="297">"key_branch_nodes": [...],</text>
  <text class="mono" x="102" y="314">"sampled_paths": [...]</text>
  <text class="mono" x="88" y="331">}</text>

  <rect class="card" x="70" y="368" width="260" height="104" rx="14"/>
  <text class="label" x="88" y="393">Natural-language problem</text>
  <line x1="88" y1="414" x2="300" y2="414" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
  <line x1="88" y1="434" x2="278" y2="434" stroke="#dbe3ec" stroke-width="5" stroke-linecap="round"/>
  <line x1="88" y1="454" x2="244" y2="454" stroke="#e5e7eb" stroke-width="5" stroke-linecap="round"/>

  <rect class="card" x="70" y="498" width="260" height="286" rx="14"/>
  <text class="label" x="88" y="523">Gold reasoning graph</text>
  <text class="tiny" x="88" y="541">tree / DAG with key decision nodes</text>
  <path class="edge-gray" d="M 200 574 C 176 594, 156 604, 143 622"/>
  <path class="edge-gray" d="M 200 574 C 224 594, 244 604, 257 622"/>
  <path class="edge-gray" d="M 143 652 C 154 684, 174 700, 195 715"/>
  <path class="edge-gray" d="M 257 652 C 246 684, 226 700, 205 715"/>
  <path class="edge-dashed" d="M 143 652 C 115 684, 103 705, 103 736"/>
  <circle class="node-orange" cx="200" cy="564" r="20"/>
  <circle class="node" cx="143" cy="638" r="18"/>
  <circle class="node" cx="257" cy="638" r="18"/>
  <circle class="node" cx="200" cy="731" r="20"/>
  <circle class="node-gray" cx="103" cy="752" r="15"/>
  <text class="small" x="200" y="568" text-anchor="middle">Q</text>
  <text class="small" x="143" y="642" text-anchor="middle">S1</text>
  <text class="small" x="257" y="642" text-anchor="middle">S2</text>
  <text class="small" x="200" y="735" text-anchor="middle">A</text>
  <text class="tiny" x="103" y="756" text-anchor="middle">cf</text>
  <text class="tiny" x="223" y="557">key branch</text>
  <path d="M 221 559 L 248 559" stroke="#f97316" stroke-width="1.3"/>

  <!-- Module 2: Reasoning Generation -->
  <rect class="header" x="422" y="118" width="276" height="42" rx="13"/>
  <text class="htext" x="560" y="145" text-anchor="middle">2. Reasoning Generation</text>

  <rect class="card-blue" x="428" y="179" width="264" height="80" rx="15"/>
  <text class="label" x="560" y="207" text-anchor="middle">LLM prompted for explicit reasoning</text>
  <rect class="chip" x="443" y="226" width="74" height="23" rx="11"/>
  <rect class="chip" x="525" y="226" width="124" height="23" rx="11"/>
  <rect class="chip-orange" x="657" y="226" width="26" height="23" rx="11"/>
  <text class="tiny" x="480" y="242" text-anchor="middle">CoT</text>
  <text class="tiny" x="587" y="242" text-anchor="middle">Self-Consistency</text>
  <text class="tiny" x="670" y="242" text-anchor="middle">ToT</text>

  <rect class="card" x="428" y="292" width="264" height="460" rx="15"/>
  <text class="label" x="560" y="320" text-anchor="middle">Tree expansion of candidate paths</text>
  <circle class="node-orange" cx="560" cy="370" r="21"/>
  <text class="small" x="560" y="374" text-anchor="middle">root</text>
  <path class="edge" d="M 547 388 C 520 420, 490 429, 466 456"/>
  <path class="edge" d="M 560 392 L 560 455"/>
  <path class="edge" d="M 573 388 C 600 420, 630 429, 654 456"/>
  <circle class="node" cx="466" cy="474" r="18"/>
  <circle class="node" cx="560" cy="474" r="18"/>
  <circle class="node" cx="654" cy="474" r="18"/>
  <text class="tiny" x="466" y="478" text-anchor="middle">p1</text>
  <text class="tiny" x="560" y="478" text-anchor="middle">p2</text>
  <text class="tiny" x="654" y="478" text-anchor="middle">pK</text>
  <path class="edge-gray" d="M 466 492 C 450 525, 440 548, 431 583"/>
  <path class="edge-gray" d="M 466 492 C 480 525, 489 548, 500 583"/>
  <path class="edge-gray" d="M 560 492 C 545 526, 533 550, 524 584"/>
  <path class="edge" d="M 560 492 C 582 529, 594 552, 602 584"/>
  <path class="edge-gray" d="M 654 492 C 637 526, 627 550, 618 584"/>
  <path class="edge-dashed" d="M 654 492 C 679 528, 686 555, 685 591"/>
  <circle class="node-gray" cx="431" cy="602" r="16"/>
  <circle class="node-gray" cx="500" cy="602" r="16"/>
  <circle class="node-gray" cx="524" cy="602" r="16"/>
  <circle class="node-orange" cx="602" cy="602" r="18"/>
  <circle class="node-gray" cx="618" cy="602" r="16"/>
  <circle class="node-gray" cx="685" cy="602" r="16"/>
  <text class="tiny" x="602" y="606" text-anchor="middle">best</text>

  <rect class="card-orange" x="450" y="658" width="220" height="60" rx="13"/>
  <text class="small" x="560" y="683" text-anchor="middle">multi-sampled traces</text>
  <text class="tiny" x="560" y="702" text-anchor="middle">lookahead, backtracking, aggregation</text>

  <!-- Module 3: Process Evaluation -->
  <rect class="header-core" x="783" y="118" width="464" height="42" rx="13"/>
  <text class="htext" x="1015" y="145" text-anchor="middle">3. Process Evaluation Module</text>
  <text class="tiny" x="1230" y="111" text-anchor="end" fill="#f97316">core highlight</text>

  <rect class="card" x="790" y="178" width="450" height="138" rx="15"/>
  <text class="label" x="1015" y="203" text-anchor="middle">Canonicalize: linear trace → reasoning graph</text>
  <rect class="card-blue" x="812" y="226" width="168" height="54" rx="10"/>
  <text class="small" x="896" y="248" text-anchor="middle">S₀ → S₁ → S₂ → S₃</text>
  <text class="tiny" x="896" y="267" text-anchor="middle">model-visible steps</text>
  <path class="arrow-main" d="M 990 253 L 1034 253"/>
  <circle class="node" cx="1078" cy="232" r="14"/>
  <circle class="node" cx="1130" cy="253" r="14"/>
  <circle class="node-orange" cx="1078" cy="276" r="14"/>
  <circle class="node" cx="1183" cy="253" r="14"/>
  <path class="edge-gray" d="M 1091 237 L 1117 248"/>
  <path class="edge-gray" d="M 1091 272 L 1117 259"/>
  <path class="edge-gray" d="M 1144 253 L 1168 253"/>
  <text class="tiny" x="1130" y="303" text-anchor="middle">state-level DAG</text>

  <rect class="card" x="790" y="340" width="450" height="87" rx="15"/>
  <text class="label" x="812" y="365">Verification and alignment sub-components</text>
  <rect class="chip" x="812" y="383" width="124" height="28" rx="12"/>
  <rect class="chip-orange" x="952" y="383" width="132" height="28" rx="12"/>
  <rect class="chip" x="1100" y="383" width="118" height="28" rx="12"/>
  <text class="tiny" x="874" y="401" text-anchor="middle">step verifier / critic</text>
  <text class="tiny" x="1018" y="401" text-anchor="middle">symbolic checker</text>
  <text class="tiny" x="1159" y="401" text-anchor="middle">gold-graph mapping</text>

  <!-- Depth card -->
  <rect class="card" x="790" y="460" width="140" height="235" rx="15"/>
  <text class="label" x="860" y="487" text-anchor="middle">Depth</text>
  <text class="tiny" x="860" y="505" text-anchor="middle">step-wise progress</text>
  <path class="edge" d="M 820 595 L 852 565"/>
  <path class="edge" d="M 860 558 L 892 525"/>
  <circle class="node" cx="820" cy="595" r="14"/>
  <circle class="node" cx="860" cy="558" r="14"/>
  <circle class="node-orange" cx="900" cy="520" r="15"/>
  <text class="tiny" x="820" y="627" text-anchor="middle">dₜ₋₁</text>
  <text class="tiny" x="861" y="628" text-anchor="middle">gain</text>
  <text class="tiny" x="902" y="628" text-anchor="middle">goal</text>
  <rect x="816" y="648" width="88" height="10" rx="5" fill="#e5e7eb"/>
  <rect x="816" y="648" width="62" height="10" rx="5" fill="#2563eb"/>
  <text class="tiny" x="860" y="676" text-anchor="middle">valid, non-redundant</text>

  <!-- Breadth card -->
  <rect class="card" x="950" y="460" width="140" height="235" rx="15"/>
  <text class="label" x="1020" y="487" text-anchor="middle">Breadth</text>
  <text class="tiny" x="1020" y="505" text-anchor="middle">branch coverage</text>
  <circle class="node-orange" cx="1020" cy="552" r="17"/>
  <path class="edge" d="M 1010 566 L 985 612"/>
  <path class="edge" d="M 1020 570 L 1020 616"/>
  <path class="edge" d="M 1030 566 L 1055 612"/>
  <path class="edge-dashed" d="M 1034 552 C 1068 560, 1075 581, 1077 617"/>
  <circle class="node" cx="985" cy="630" r="13"/>
  <circle class="node" cx="1020" cy="634" r="13"/>
  <circle class="node" cx="1055" cy="630" r="13"/>
  <circle class="node-gray" cx="1078" cy="634" r="12"/>
  <text class="tiny" x="1020" y="676" text-anchor="middle">covered / diverse / cf</text>

  <!-- Consistency card -->
  <rect class="card" x="1110" y="460" width="140" height="235" rx="15"/>
  <text class="label" x="1180" y="487" text-anchor="middle">Consistency</text>
  <text class="tiny" x="1180" y="505" text-anchor="middle">coherence &amp; errors</text>
  <circle class="node" cx="1145" cy="548" r="13"/>
  <circle class="node" cx="1190" cy="548" r="13"/>
  <circle class="node-gray" cx="1168" cy="608" r="13"/>
  <circle class="node-orange" cx="1215" cy="608" r="13"/>
  <path class="edge-gray" d="M 1158 548 L 1177 548"/>
  <path class="edge-gray" d="M 1150 561 L 1163 594"/>
  <path class="edge-broken" d="M 1196 560 L 1209 594"/>
  <line x1="1203" y1="585" x2="1222" y2="604" stroke="#f97316" stroke-width="3"/>
  <line x1="1222" y1="585" x2="1203" y2="604" stroke="#f97316" stroke-width="3"/>
  <text class="tiny" x="1180" y="653" text-anchor="middle">broken edge / contradiction</text>
  <text class="tiny" x="1180" y="674" text-anchor="middle">global self-consistency</text>

  <rect class="card-orange" x="820" y="724" width="400" height="68" rx="15"/>
  <path d="M 851 743 L 868 774 L 834 774 Z" fill="#f97316" opacity="0.95"/>
  <text class="score" x="851" y="768" text-anchor="middle" fill="#ffffff">!</text>
  <text class="label" x="888" y="755">Earliest error detection</text>
  <text class="small" x="888" y="776">Locate first invalid, unsupported, or contradictory step Sₜ</text>

  <!-- Module 4: Output Layer -->
  <rect class="header" x="1342" y="118" width="196" height="42" rx="13"/>
  <text class="htext" x="1440" y="145" text-anchor="middle">4. Output Layer</text>

  <rect class="card-blue" x="1345" y="180" width="190" height="585" rx="15"/>
  <text class="label" x="1440" y="210" text-anchor="middle">Structured scores</text>
  <text class="tiny" x="1440" y="229" text-anchor="middle">scores.json / report table</text>

  <rect class="card" x="1362" y="255" width="156" height="55" rx="11"/>
  <text class="score" x="1380" y="280">Depth Score</text>
  <rect x="1380" y="292" width="118" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="1380" y="292" width="84" height="8" rx="4" fill="#2563eb"/>

  <rect class="card" x="1362" y="326" width="156" height="55" rx="11"/>
  <text class="score" x="1380" y="351">Breadth Score</text>
  <rect x="1380" y="363" width="118" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="1380" y="363" width="71" height="8" rx="4" fill="#f97316"/>

  <rect class="card" x="1362" y="397" width="156" height="55" rx="11"/>
  <text class="score" x="1380" y="422">Consistency Score</text>
  <rect x="1380" y="434" width="118" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="1380" y="434" width="96" height="8" rx="4" fill="#2563eb"/>

  <rect class="card" x="1362" y="468" width="156" height="72" rx="11"/>
  <text class="score" x="1380" y="493">Branch Coverage</text>
  <text class="small" x="1380" y="516">&amp; Diversity</text>

  <rect class="card-orange" x="1362" y="556" width="156" height="64" rx="11"/>
  <text class="score" x="1380" y="582">First Error Step</text>
  <text class="small" x="1380" y="604">Sₜ with evidence</text>

  <rect class="card" x="1362" y="647" width="156" height="82" rx="11"/>
  <text class="mono" x="1380" y="675">{</text>
  <text class="mono" x="1392" y="693">"depth": 0-100,</text>
  <text class="mono" x="1392" y="711">"breadth": 0-100</text>
  <text class="mono" x="1380" y="724">}</text>
</svg>

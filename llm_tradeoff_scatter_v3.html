
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1.25rem;display:flex;flex-direction:column;gap:1.25rem}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.row2{grid-template-columns:1fr}}
.card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px}
.card-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.chart-h{position:relative;width:100%;height:200px}
.full-h{position:relative;width:100%;height:260px}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--color-text-secondary);margin-top:8px}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.title-main{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.sub{font-size:12px;color:var(--color-text-secondary)}
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.mc-l{font-size:11px;color:var(--color-text-tertiary);margin-bottom:3px}
.mc-v{font-size:20px;font-weight:500;color:var(--color-text-primary)}
</style>

<div class="wrap">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px">
    <div>
      <p class="title-main">深度–广度权衡空间分析</p>
      <p class="sub" style="margin-top:2px">主流 LLM 在逻辑推理三维评分上的分布态势</p>
    </div>
  </div>

  <div class="metric-row">
    <div class="mc"><div class="mc-l">最高深度指数</div><div class="mc-v" style="color:#8b5cf6">82</div><div style="font-size:11px;color:var(--color-text-tertiary)">Claude 3.5</div></div>
    <div class="mc"><div class="mc-l">最高广度指数</div><div class="mc-v" style="color:#ef4444">72</div><div style="font-size:11px;color:var(--color-text-tertiary)">DeepSeek-R1</div></div>
    <div class="mc"><div class="mc-l">综合最优模型</div><div class="mc-v" style="color:#3b82f6">GPT-4o</div><div style="font-size:11px;color:var(--color-text-tertiary)">三维均衡</div></div>
  </div>

  <div class="row2">
    <div class="card">
      <div class="card-title">深度 vs 广度散点图</div>
      <div class="full-h"><canvas id="scatter" role="img" aria-label="深度广度散点图，展示模型分布"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">一致性 vs 综合分</div>
      <div class="full-h"><canvas id="scatter2" role="img" aria-label="一致性与综合评分散点图"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">三维全景雷达</div>
    <div class="chart-h"><canvas id="radar" role="img" aria-label="五模型三维雷达对比"></canvas></div>
    <div class="legend">
      <span><span class="dot" style="background:#3b82f6"></span>GPT-4o</span>
      <span><span class="dot" style="background:#8b5cf6"></span>Claude 3.5</span>
      <span><span class="dot" style="background:#10b981"></span>Gemini 1.5 Pro</span>
      <span><span class="dot" style="background:#f59e0b"></span>Qwen-2.5-72B</span>
      <span><span class="dot" style="background:#ef4444"></span>DeepSeek-R1</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const M=[
  {name:'GPT-4o',       d:78, b:65, c:74, color:'#3b82f6'},
  {name:'Claude 3.5',   d:82, b:58, c:80, color:'#8b5cf6'},
  {name:'Gemini 1.5',   d:71, b:70, c:66, color:'#10b981'},
  {name:'Qwen-2.5-72B', d:65, b:67, c:60, color:'#f59e0b'},
  {name:'DeepSeek-R1',  d:76, b:72, c:68, color:'#ef4444'},
];

function ha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}

new Chart(document.getElementById('scatter'),{
  type:'scatter',
  data:{datasets:M.map(m=>({
    label:m.name,data:[{x:m.d,y:m.b}],
    backgroundColor:ha(m.color,0.85),pointRadius:10,pointHoverRadius:13,
    pointStyle:'circle'
  }))},
  options:{responsive:true,maintainAspectRatio:false,
    scales:{
      x:{min:55,max:90,title:{display:true,text:'Score_Depth',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:10}}},
      y:{min:50,max:80,title:{display:true,text:'Score_Breadth',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:10}}}
    },
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{label:c=>`${c.dataset.label}　D:${c.parsed.x} B:${c.parsed.y}`}},
      afterDraw(chart){
        const ctx=chart.ctx;
        chart.data.datasets.forEach((ds,i)=>{
          const pt=chart.getDatasetMeta(i).data[0];
          if(!pt)return;
          ctx.save();ctx.font='10px sans-serif';ctx.fillStyle=ds.backgroundColor;
          ctx.fillText(ds.label,pt.x+10,pt.y-6);ctx.restore();
        });
      }
    }
  }
});

new Chart(document.getElementById('scatter2'),{
  type:'scatter',
  data:{datasets:M.map(m=>({
    label:m.name,
    data:[{x:m.c,y:Math.round((m.d+m.b+m.c)/3)}],
    backgroundColor:ha(m.color,0.85),pointRadius:10,pointHoverRadius:13
  }))},
  options:{responsive:true,maintainAspectRatio:false,
    scales:{
      x:{min:52,max:86,title:{display:true,text:'Score_Consistency',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:10}}},
      y:{min:55,max:80,title:{display:true,text:'综合分 (三维均值)',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:10}}}
    },
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}　Cons:${c.parsed.x}　综合:${c.parsed.y}`}}}
  }
});

new Chart(document.getElementById('radar'),{
  type:'radar',
  data:{labels:['深度','广度','一致性'],datasets:M.map(m=>({
    label:m.name,data:[m.d,m.b,m.c],
    backgroundColor:ha(m.color,0.07),borderColor:m.color,pointBackgroundColor:m.color,
    borderWidth:1.5,pointRadius:4
  }))},
  options:{responsive:true,maintainAspectRatio:false,
    scales:{r:{min:40,max:100,ticks:{font:{size:9},stepSize:20},grid:{color:'rgba(128,128,128,0.12)'},pointLabels:{font:{size:12}}}},
    plugins:{legend:{display:false}}
  }
});
</script>
